site_name: 100 Days DevOps Journal
site_description: Reto personal de 100 días aprendiendo DevOps en la práctica
site_author: Carlos Lopez
site_url: https://challenge.krlosaren.com
docs_dir: docs
site_dir: site

theme:
  name: material
  language: es
  palette:
    scheme: default
    primary: orange
    accent: deep orange
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - navigation.footer
    - navigation.path

plugins:
  - search:
      lang: es

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html

